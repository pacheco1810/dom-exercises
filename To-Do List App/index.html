<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>To-Do List</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="" type="image/x-icon">
        <script src="https://kit.fontawesome.com/22e6d018f3.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header class="app-header">
        <!-- Logo -->
        <!-- Search -->
        <!-- User -->
        </header>

        <main>
            <section class="workspace">
                
                <header class="workspace-header">
                    <span class="workspace-label">WORKSPACE</span>
                    
                    <h1 class="workspace-title">Today’s Focus</h1>
                    
                    <time id="current-date" datetime=""></time>
                </header>

                <form class="task-form">
                    <label for="task-input" class="visually-hidden">Add a new task</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true"><i class="fa-solid fa-file-pen"></i></span>
                        <input 
                        type="text"
                        id="task-input"
                        name="task"
                        placeholder="What needs to be done today?"
                        required/>
                    </div>
                    <button type="submit" class="add-btn">Add Task</button>
                </form>

                <section class="task-section">
                    <h2 class="visually-hidden">Task list</h2>

                    <ul class="task-list">

                        <li class="task-item">
                            <input type="checkbox" />
                            <label class="task-label">Review architectural mockups for project</label>
                            <button 
                                type="button" 
                                class="delete-btn"
                                aria-label="Delete task: Buy groceries"
                            >
                                <i class="fa-solid fa-trash-can" aria-hidden="true"></i>
                            </button>
                        </li>

                        

                    </ul>
                </section>
                
            </section>
        </main>
        <footer>
            <p class="labelCopyright" id="paraCopyright">&copy; <span id="yearCopyright"></span> @ang.dev>_. All rights reserved.</p>
        </footer>
        <script type="text/javascript" src="script.js"></script>
    </body>
</html>
